# Conda environment for befunge.
# Install: conda env create -f environment.yml
#
# Default torch is the cu128 CUDA build (includes Blackwell / sm_120 — e.g.
# RTX 50-series). For CPU-only torch, replace the cu128 index-url below with
# the CPU wheel index: https://download.pytorch.org/whl/cpu
name: befunge
channels:
  - conda-forge
dependencies:
  - python=3.12
  - numpy=2.2
  - numba
  - matplotlib
  - pandas
  - pyarrow
  - jupyterlab
  - pip
  - pip:
    # torch with Blackwell-supporting cu128 wheels (see top for CPU alt)
    - --index-url https://download.pytorch.org/whl/cu128
    - --extra-index-url https://pypi.org/simple
    - torch>=2.7
    - tensorboard
